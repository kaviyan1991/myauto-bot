name: Run MyAuto Bot

on:
  schedule:
    - cron: '*/10 * * * *' # تغییر زمان‌بندی به دقیقاً هر ۱۰ دقیقه یک‌بار
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Cache (sent cars list)
        uses: actions/download-artifact@v4
        with:
          name: bot-cache
          path: .
        continue-on-error: true # در اولین اجرا اگر فایلی نبود خطا ندهد

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        run: python bot.py

      - name: Upload/Update Cache
        uses: actions/upload-artifact@v4
        with:
          name: bot-cache
          path: sent_cars.txt
          retention-days: 7 # فایل کش تا ۷ روز در سرور بماند
